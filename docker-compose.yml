services:
  backend:
    build:
      context: ./backend
    container_name: codecollab-backend
    ports:
      - "3000:3000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_SERVER_URL: http://localhost:3000
    container_name: codecollab-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
